<!DOCTYPE html>

<title>Brick-By-Brick Command Line</title>

<body>

<h1>Brick-By-Brick command line</h1>

<div class="container">

    <!-- LEFT -->
    <div class="left-panel">
        <button class="start" onclick="connectArduino()">Start</button>
        <button class="stop" onclick="disconnectArduino()">Stop</button>
        <button class="menu" onclick="openMenu()">Button Menu</button>
        <button class="help" onclick="openHelp()">Help</button>
    </div>

    <!-- CENTER -->
    <div class="center-panel">
        <input id="messageInput" placeholder="insert message...">
        <button class="send" onclick="sendMessage()">Send message</button>
    </div>

    <!-- RIGHT -->
    <div>
        <h3>Console window</h3>
        <div id="console" class="console"></div>
    </div>

</div>

<!-- HELP POPUP -->
<div id="helpPopup" class="popup">
    <h3>Help Menu</h3>
    <ul>
        <li><b>Start:</b> Connect to Arduino</li>
        <li><b>Stop:</b> Disconnect from Arduino</li>
        <li><b>Send Message:</b> Send binary string to Arduino</li>
        <li><b>Button Menu:</b> Opens control buttons</li>
    </ul>
    <button onclick="closeHelp()">Close</button>
</div>

<!-- BUTTON MENU POPUP -->
<div id="menuPopup" class="popup">

        <!-- IDENTIFIER CONVEYOR -->
        <h4>Identifier Conveyor</h4>

        <!-- LIFTING MOTOR -->
        <h4>Lifting Motor</h4>
